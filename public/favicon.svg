<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Store">
  <defs>
    <!-- Stripi gradient-mesh corner accent: cream → indigo → magenta -->
    <radialGradient id="mesh" cx="18%" cy="18%" r="85%">
      <stop offset="0%"  stop-color="#f5e9d4" stop-opacity="0.85"/>
      <stop offset="40%" stop-color="#665efd" stop-opacity="0.55"/>
      <stop offset="80%" stop-color="#f96bee" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#0d253d" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="tile">
      <rect x="0" y="0" width="64" height="64" rx="14" ry="14"/>
    </clipPath>
  </defs>

  <!-- Deep-ink tile (brand body color) -->
  <rect x="0" y="0" width="64" height="64" rx="14" ry="14" fill="#0d253d"/>

  <!-- Gradient-mesh corner wash (brand signature) -->
  <rect x="0" y="0" width="64" height="64" fill="url(#mesh)" clip-path="url(#tile)"/>

  <!-- S. monogram — echoes the navbar wordmark -->
  <text
    x="17" y="46"
    font-family="Inter, 'SF Pro Display', system-ui, -apple-system, sans-serif"
    font-size="38"
    font-weight="500"
    fill="#ffffff"
    letter-spacing="-1.5"
  >S</text>

  <!-- Indigo period (primary CTA color) — the wordmark's signature dot -->
  <circle cx="44" cy="44" r="4" fill="#533afd"/>
</svg>
